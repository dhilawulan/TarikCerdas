<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - TarikCerdas</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Daftar <span>TarikCerdas</span></h2>
            <p style="color: #ccc; font-size: 14px; margin-bottom: 20px;">
                Buat akun baru untuk memulai permainan
            </p>

            <form action="/register" method="POST">
                <input type="text" name="fullname" placeholder="Nama Lengkap" required>
                
                <input type="email" name="email" placeholder="Email Aktif" required>
                
                <input type="text" name="username" placeholder="Username" required>
                
                <input type="password" name="password" placeholder="Password" required>
                
                <button type="submit">Daftar</button>
            </form>

            <div style="margin-top: 20px; font-size: 14px; color: #ccc;">
                Sudah punya akun? <a href="/login">Masuk</a>
            </div>
        </div>
    </div>

</body>
</html>
