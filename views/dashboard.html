<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - TarikCerdas</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="top-nav">
    <div class="dropdown">
      <button class="icon-btn-dropdown" type="button" id="settingMenu" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-gear-fill"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-dark custom-dropdown" aria-labelledby="settingMenu">
        <li>
          <a class="dropdown-item" href="/edit-profile">
            <i class="bi bi-pencil-square me-2"></i> Edit Profile
          </a>
        </li>
        <li>
          <a class="dropdown-item" href="/tambah-kategori">
            <i class="bi bi-plus-circle me-2"></i> Tambahkan Kategori
          </a>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <a class="dropdown-item text-danger" href="/logout">
            <i class="bi bi-box-arrow-right me-2"></i> Logout
          </a>
        </li>
      </ul>
    </div>
  </div>

  <div class="dashboard-wrapper">
    <div class="brand-name">Tarik<span>Cerdas</span></div>
    <h1 class="dashboard-title">Dashboard</h1>
    <p class="subtitle">Silakan pilih kelas untuk memulai tantangan</p>

    <div class="class-container" id="classContainer">
      <a href="/low" class="class-card"> low
     <img src="https://img.icons8.com/papercut/100/open-book.png" class="card-icon" alt="icon">
     </a>

      <a href="/middle" class="class-card">
        middle
      </a>

      <a href="/high" class="class-card">
        high
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Load custom kategori dari localStorage dan tampilkan di dashboard
    document.addEventListener('DOMContentLoaded', function() {
      const customKategoriList = JSON.parse(localStorage.getItem('customKategori')) || [];
      const classContainer = document.getElementById('classContainer');
      
      // Tambahkan tombol untuk setiap custom kategori
      customKategoriList.forEach(kategori => {
        const card = document.createElement('a');
        card.href = `/category/${encodeURIComponent(kategori)}`;
        card.className = 'class-card';
        card.textContent = kategori;
        classContainer.appendChild(card);
      });
    });
  </script>
