<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - TarikCerdas</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Lupa <span>Password?</span></h2>
            <p style="color: #ccc; font-size: 14px; margin-bottom: 20px;">
                Masukkan email Anda untuk menerima instruksi reset password.
            </p>

            <form action="/forgot-password" method="POST">
                <input type="email" name="email" placeholder="Masukkan Email Terdaftar" required>
                
                <button type="submit">Kirim Link Reset</button>
            </form>

            <div style="margin-top: 20px; font-size: 14px; color: #ccc;">
                Ingat password? <a href="/login" style="color: #ff4da6; text-decoration: none;">Kembali Login</a>
            </div>
        </div>
    </div>

</body>
</html>
