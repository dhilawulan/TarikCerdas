<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{background:#000;color:#fff;font-family: 'Poppins', sans-serif}
        .edit-wrap{max-width:820px;margin:40px auto;padding:40px 30px;position:relative}
        .card{background:transparent;padding:30px;border-radius:12px;text-align:center}
        h1{font-size:48px;margin:0 0 6px;color:#fff}
        .subtitle{color:#9d2d6b;margin-bottom:28px}
        .avatar{width:120px;height:120px;border-radius:50%;background:linear-gradient(180deg,#fff0,#fff);display:inline-flex;align-items:center;justify-content:center;margin:20px auto;border:8px solid #9d2d6b}
        form{max-width:620px;margin:0 auto}
        .input-row{display:flex;align-items:center;background:#222;border:3px solid #9d2d6b;padding:12px 16px;border-radius:28px;margin:12px 0}
        .input-row i{color:#9b9b9b;margin-right:12px;font-size:18px}
        .input-row input{background:transparent;border:0;outline:none;color:#ddd;font-size:16px;width:100%}
        .save-btn{position:absolute;right:30px;bottom:30px;background:#9d2d6b;color:#fff;padding:14px 22px;border-radius:28px;border:0;font-weight:700;cursor:pointer}
        @media(max-width:600px){.save-btn{position:static;display:block;width:100%;margin-top:18px}}
    </style>
</head>
<body>
    <div class="edit-wrap">
        <div class="card">
            <h1>Edit Profile</h1>
            <div class="subtitle">Ubah Informasi Anda</div>
            <div class="avatar">
                <i class="fa-solid fa-user-pen" style="font-size:48px;color:#fff"></i>
            </div>

            <form action="/edit-profile" method="post">
                <div class="input-row">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="fullname" placeholder="Nama Pengguna" required>
                </div>

                <div class="input-row">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" name="email" placeholder="Email" required>
                </div>

                <div class="input-row">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="Password Baru (kosongkan jika tidak diubah)">
                </div>

                <button type="submit" class="save-btn">Simpan Perubahan</button>
                   <div class="form-footer">
                <a href="/dashboard" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
                </a>
            </div>
            </form>
        </div>
    </div>
</body>
</html>
