<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - TarikCerdas</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Password <span>Baru</span></h2>
            <p style="color: #ccc; font-size: 14px; margin-bottom: 20px;">
                Masukkan password baru Anda di bawah ini.
            </p>

            <form action="/update-password" method="POST">
                <input type="hidden" name="userId" id="userIdInput">
                
                <input type="password" name="newPassword" placeholder="Password Baru" required>
                
                <button type="submit">Simpan Password</button>
            </form>
        </div>
    </div>

    <script>
        // Mengambil ID user dari URL otomatis
        const pathArray = window.location.pathname.split('/');
        const userId = pathArray[pathArray.length - 1];
        document.getElementById('userIdInput').value = userId;
    </script>
</body>
</html>
